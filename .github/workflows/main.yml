name: node_type_try

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on : ubuntu-latest

    steps:
       # 1️⃣ Checkout source code
      - name : checkout respositoy
        uses : actions/checkout@v4

       # 2️⃣ Set up Node.js
      - name : Setup node js
        uses : actions/setup-node@v4
        with :
          node-version: 20

      - name : Install Dependencies
        run : npm install

      - name : Build TypeScript
        run : npm run build

      - name : Login To Dcoker Hub
        run : echo "${{secrets.DOCKER_PASSWORD}}" docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin
      
        # 6️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-ts-app:latest .

      # 7️⃣ Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-ts-app:latest